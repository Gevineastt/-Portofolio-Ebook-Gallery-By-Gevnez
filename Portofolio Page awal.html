<style>
      body {
        background-color: #F4F1EA;
        color: #1c1b1b;
      }
      .brutalist-border {
        border: 3px solid #1c1b1b;
      }
      .brutalist-shadow {
        box-shadow: 6px 6px 0px 0px #1c1b1b;
        transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease-in-out;
      }
      .brutalist-shadow-hover:hover {
        transform: translate(-4px, -4px);
        box-shadow: 10px 10px 0px 0px #1c1b1b;
      }
      .brutalist-shadow-hover:active {
        transform: translate(4px, 4px);
        box-shadow: 2px 2px 0px 0px #1c1b1b;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

      /* Floating Headers Animation */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .floating-header {
        display: inline-block;
        animation: float 4s ease-in-out infinite;
      }

      /* 3D Container */
      .tilt-card {
        transform-style: preserve-3d;
        perspective: 1000px;
      }

      /* Ticker / Marquee Animations */
      @keyframes ticker-scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }

      .ticker-container {
        overflow: hidden;
        width: 100%;
        position: relative;
      }

      .ticker-track {
        display: flex;
        width: max-content;
        animation: ticker-scroll var(--speed, 30s) linear infinite;
      }
      
      .ticker-track:hover {
        animation-play-state: paused;
      }

      /* Specific track adjustments */
      .track-pendidikan { --speed: 25s; }
      .track-keahlian { --speed: 40s; }
      .track-karya { --speed: 35s; }

      /* Floating Dots Canvas Styles */
      #dots-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

    </style>
